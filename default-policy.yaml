version: '1.0'
policy:
  mode: block
  # Fail-closed: tools not explicitly allowlisted are blocked (see allowlist-common-tools).
  default_action: block
  semantic_shell: true
  rules:
    - name: deny-dangerous-tools
      description: Explicitly deny tools that can execute arbitrary code
      action: block
      tools:
        deny:
          - execute_command
          - bash
          - sh
          - eval
          - exec
          - execute
          - system
          - spawn
          - fork
          - popen
          - source
          - powershell
          - pwsh
          - cmd
    - name: deny-github-write-tools
      description: Block GitHub mutation tools (exfil via create_issue, push, etc.)
      action: block
      tools:
        deny:
          - create_issue
          - create_pull_request
          - update_issue
          - push_files
          - create_repository
          - delete_repository
          - merge_pull_request
    - name: allowlist-common-tools
      description: Read-only / query tools; all others blocked by default_action
      action: block
      tools:
        allow:
          - read_file
          - read_text_file
          - list_directory
          - list_files
          - get_file_contents
          - search
          - search_files
          - search_repositories
          - list_tables
          - query
          - echo
          - puppeteer_navigate
          - puppeteer_screenshot
    - name: block-sensitive-paths
      description: Block reads/lists of credentials, SSH, env files, and filesystem root
      action: block
      argPatterns:
        - field: path
          patterns:
            - '^/$'
            - '^/etc/'
            - '/\\.ssh'
            - '/\\.env'
            - '/\\.aws/credentials'
            - '(?:^|/)passwd$'
            - 'id_rsa'
        - field: file
          patterns:
            - '^/$'
            - '^/etc/'
            - '/\\.ssh'
            - '/\\.env'
            - '/\\.aws/credentials'
        - field: directory
          patterns:
            - '^/$'
            - '^/etc/'
    - name: block-sql-exfil
      description: Block obvious bulk data exfiltration SQL in tool arguments
      action: block
      argPatterns:
        - field: sql
          patterns:
            - \bselect\b.+\bfrom\b.+\b(accounts|customers|users|credentials|secrets)\b
            - \bunion\s+select\b
            - \bdrop\s+table\b
        - field: query
          patterns:
            - \bselect\b.+\bfrom\b.+\b(accounts|customers|users|credentials|secrets)\b
    - name: block-path-traversal
      description: Block tool calls with path traversal attempts
      action: block
      patterns:
        - \.\.
    - name: block-shell-injection
      description: Block shell injection, downloaders, and PowerShell encoded commands
      action: block
      patterns:
        - curl\s|wget\s
        - rm\s+-rf
        - ;\s*\w
        - '&&|\|\|'
        - \$\{
        - '`[^`]+`'
        - powershell|pwsh|-enc|-EncodedCommand
    - name: rate-limit-tool-calls
      description: Limit tool calls to 120 per minute per server+tool
      action: flag
      maxCallsPerMinute: 120
    - name: token-budget
      description: Flag tool calls exceeding 50K input tokens
      action: flag
      maxTokens: 50000

services:
  - type: web
    name: mastyff-ai
    runtime: node
    repo: https://github.com/mastyff-ai/mastyff-ai
    buildCommand: npm install -g pnpm && pnpm install --no-frozen-lockfile && pnpm run build
    startCommand: node render-start.js
    buildFilter:
      paths:
        - src/**/*.ts
        - packages/**/*.ts
        - package.json
        - tsconfig.json
    envVars:
      - key: NODE_ENV
        value: production
      - key: MASTYFF_AI_DB_PATH
        value: /tmp/mastyff-ai.db
# Standby region overlay — use with primary values-enterprise.yaml
#   helm upgrade --install mastyff-ai ./deploy/helm/mastyff-ai \
#     -f deploy/helm/mastyff-ai/values.yaml \
#     -f deploy/helm/mastyff-ai/values-enterprise.yaml \
#     -f deploy/helm/mastyff-ai/values-enterprise-standby.yaml

replicaCount: 2

config:
  env:
    MASTYFF_AI_REGION: "eu-west-1"
    MASTYFF_AI_MULTI_REGION_MODE: "active-active"
    # Dashboard-only pods may use read-replica DATABASE_URL (set per cluster)
    MASTYFF_AI_DASHBOARD_DATA_SOURCE: "unified"

gateway:
  ingress:
    host: mastyff-ai-standby.example.com

# Point at cross-region shared Redis for DPoP jti + optional global rate cap
# config.env.MASTYFF_AI_DPOP_REDIS_URL: "rediss://global-redis.example.com:6379"
# config.env.MASTYFF_AI_GLOBAL_RATE_LIMIT_REDIS_URL: "rediss://global-redis.example.com:6379"
# config.env.MASTYFF_AI_GLOBAL_RATE_LIMIT_MAX: "10000"

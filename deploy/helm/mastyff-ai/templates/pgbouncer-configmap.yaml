{{- if .Values.pgbouncer.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "mastyff-ai.fullname" . }}-pgbouncer
  labels:
    {{- include "mastyff-ai.labels" . | nindent 4 }}
data:
  pgbouncer.ini: |
    [databases]
    * = host={{ .Values.pgbouncer.postgresHost | default "postgres" }} port={{ .Values.pgbouncer.postgresPort | default 5432 }}

    [pgbouncer]
    listen_addr = 0.0.0.0
    listen_port = {{ .Values.pgbouncer.port | default 6432 }}
    auth_type = md5
    pool_mode = transaction
    max_client_conn = {{ .Values.pgbouncer.maxClientConn | default 1000 }}
    default_pool_size = {{ .Values.pgbouncer.defaultPoolSize | default 20 }}
    server_idle_timeout = {{ .Values.pgbouncer.serverIdleTimeout | default 300 }}
    query_timeout = {{ .Values.pgbouncer.queryTimeout | default 120 }}
    admin_users = {{ .Values.pgbouncer.adminUser | default "postgres" }}
{{- end }}

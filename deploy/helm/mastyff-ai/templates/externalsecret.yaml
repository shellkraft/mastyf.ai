{{- if .Values.externalSecrets.enabled }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "mastyff-ai.fullname" . }}-secrets
  labels:
    {{- include "mastyff-ai.labels" . | nindent 4 }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: {{ .Values.externalSecrets.secretStore }}
    kind: ClusterSecretStore
  target:
    name: {{ include "mastyff-ai.fullname" . }}-secret
    creationPolicy: Owner
  data:
    - secretKey: NVD_API_KEY
      remoteRef:
        key: {{ .Values.externalSecrets.path }}/nvd-api-key
    - secretKey: JWT_SECRET
      remoteRef:
        key: {{ .Values.externalSecrets.path }}/jwt-secret
    - secretKey: REDIS_PASSWORD
      remoteRef:
        key: {{ .Values.externalSecrets.path }}/redis-password
    - secretKey: ANTHROPIC_API_KEY
      remoteRef:
        key: {{ .Values.externalSecrets.path }}/anthropic-api-key
    - secretKey: MCP_AUTH_JWT_SECRET
      remoteRef:
        key: {{ .Values.externalSecrets.path }}/mcp-auth-jwt-secret
    - secretKey: redis-url
      remoteRef:
        key: {{ .Values.externalSecrets.path }}/redis-url
    - secretKey: database-url
      remoteRef:
        key: {{ .Values.externalSecrets.path }}/database-url
    - secretKey: DASHBOARD_API_KEY
      remoteRef:
        key: {{ .Values.externalSecrets.path }}/dashboard-api-key
    - secretKey: DASHBOARD_JWT_SECRET
      remoteRef:
        key: {{ .Values.externalSecrets.path }}/dashboard-jwt-secret
{{- end }}
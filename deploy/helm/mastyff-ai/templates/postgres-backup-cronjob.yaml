{{- if and .Values.backup.enabled (eq .Values.database.type "postgres") }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "mastyff-ai.fullname" . }}-pg-backup
  labels:
    {{- include "mastyff-ai.labels" . | nindent 4 }}
spec:
  schedule: {{ .Values.backup.schedule | quote }}
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: pg-basebackup
              image: {{ .Values.backup.postgresImage | default "postgres:16-alpine" | quote }}
              env:
                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.backup.postgresSecret | default (include "mastyff-ai.fullname" .) }}
                      key: {{ .Values.backup.postgresPasswordKey | default "postgres-password" }}
              command: ["/bin/sh", "-c"]
              args:
                - |
                  set -e
                  STAMP=$(date +%Y%m%d-%H%M%S)
                  pg_basebackup -h {{ .Values.backup.postgresHost | default "postgres" }} \
                    -p {{ .Values.backup.postgresPort | default 5432 }} \
                    -U {{ .Values.backup.postgresUser | default "postgres" }} \
                    -D /backup/base-$STAMP -Ft -z -P
                  find /backup -name 'base-*' -mtime +{{ .Values.backup.retentionDays | default 7 }} -delete || true
              volumeMounts:
                - name: backup
                  mountPath: /backup
          volumes:
            - name: backup
              persistentVolumeClaim:
                claimName: {{ include "mastyff-ai.fullname" . }}-backup
{{- end }}

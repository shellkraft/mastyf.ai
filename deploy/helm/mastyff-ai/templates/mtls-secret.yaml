{{- if .Values.mtls.enabled }}
# Example TLS secret for upstream mTLS (proxy client cert).
# Create before install:
#   kubectl create secret generic {{ .Values.mtls.existingSecret | default (printf "%s-mtls" (include "mastyff-ai.fullname" .)) }} \
#     --from-file=ca.pem=./ca.pem \
#     --from-file=tls.crt=./client.crt \
#     --from-file=tls.key=./client.key
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.mtls.existingSecret | default (printf "%s-mtls" (include "mastyff-ai.fullname" .)) }}
  labels:
    {{- include "mastyff-ai.labels" . | nindent 4 }}
type: Opaque
stringData:
  ca.pem: |
    # REPLACE: PEM CA bundle for upstream MCP servers
  tls.crt: |
    # REPLACE: PEM client certificate for Mastyff AI proxy
  tls.key: |
    # REPLACE: PEM client private key
{{- end }}

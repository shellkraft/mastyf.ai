apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "mastyf-ai.fullname" . }}
  labels:
    {{- include "mastyf-ai.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    {{- toYaml .Values.strategy | nindent 4 }}
  selector:
    matchLabels:
      {{- include "mastyf-ai.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "mastyf-ai.selectorLabels" . | nindent 8 }}
      annotations:
        {{- if .Values.metrics.enabled }}
        prometheus.io/scrape: "true"
        prometheus.io/port: {{ .Values.metrics.port | quote }}
        prometheus.io/path: "/metrics"
        {{- end }}
    spec:
      serviceAccountName: {{ include "mastyf-ai.fullname" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: mastyf-ai
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - node
            - dist/cli.js
            - proxy
            - --config
            - {{ .Values.config.mcpConfigPath }}
            - --policy
            - {{ .Values.config.policy.path }}
            - --blocking-mode
            - {{ .Values.config.policy.mode }}
            {{- if .Values.gateway.enabled }}
            - --gateway
            {{- end }}
          env:
            - name: REPLICA_COUNT
              value: {{ .Values.replicaCount | quote }}
            - name: MASTYF_AI_REPLICA_COUNT
              value: {{ .Values.replicaCount | quote }}
            - name: MASTYF_AI_DB_PATH
              value: {{ .Values.persistence.mountPath }}/history.db
            {{- if eq .Values.database.type "postgres" }}
            - name: DB_TYPE
              value: postgres
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.existingSecret | default (printf "%s-secret" (include "mastyf-ai.fullname" .)) }}
                  key: database-url
                  optional: true
            {{- if .Values.pgbouncer.requireMastyfAiEnforcement }}
            - name: MASTYF_AI_REQUIRE_PGBOUNCER
              value: "true"
            {{- end }}
            - name: MASTYF_AI_PG_POOL_MAX
              value: {{ .Values.pgbouncer.poolMaxPerReplica | default "4" | quote }}
            {{- end }}
            {{- if and .Values.redis.sentinel.external .Values.redis.sentinel.sentinels }}
            - name: REDIS_SENTINELS
              value: {{ .Values.redis.sentinel.sentinels | quote }}
            - name: REDIS_SENTINEL_MASTER_NAME
              value: {{ .Values.redis.sentinel.masterName | quote }}
            {{- else if .Values.redis.enabled }}
            - name: REDIS_URL
              value: redis://{{ .Release.Name }}-redis-master:6379
            {{- else if .Values.secrets.existingSecret }}
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.existingSecret }}
                  key: redis-url
                  optional: true
            {{- end }}
            {{- if .Values.mtls.enabled }}
            - name: MCP_TLS_ENABLED
              value: "true"
            - name: MCP_TLS_CA
              value: /etc/mastyf-ai/tls/ca.pem
            - name: MCP_TLS_CERT
              value: /etc/mastyf-ai/tls/tls.crt
            - name: MCP_TLS_KEY
              value: /etc/mastyf-ai/tls/tls.key
            {{- end }}
            {{- if .Values.dpop.require }}
            - name: MASTYF_AI_REQUIRE_DPOP
              value: "true"
            {{- end }}
            {{- if .Values.multiTenant.enabled }}
            - name: MASTYF_AI_MULTI_TENANT_ENABLED
              value: "true"
            {{- end }}
            {{- if .Values.multiTenant.tenantId }}
            - name: MASTYF_AI_TENANT_ID
              value: {{ .Values.multiTenant.tenantId | quote }}
            {{- end }}
            {{- range $key, $val := .Values.config.env }}
            - name: {{ $key }}
              value: {{ $val | quote }}
            {{- end }}
            {{- if .Values.monitoring.otel.enabled }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ .Values.monitoring.otel.endpoint | quote }}
            - name: OTEL_SERVICE_NAME
              value: {{ .Values.monitoring.otel.serviceName | default (include "mastyf-ai.fullname" .) | quote }}
            {{- end }}
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
          {{- if or .Values.externalSecrets.enabled .Values.secrets.existingSecret }}
          envFrom:
            - secretRef:
                name: {{ .Values.secrets.existingSecret | default (printf "%s-secret" (include "mastyf-ai.fullname" .)) }}
                optional: true
          {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
            {{- if .Values.gateway.enabled }}
            - name: gateway
              containerPort: {{ .Values.gateway.service.port }}
              protocol: TCP
            {{- if .Values.gateway.websocketPort }}
            - name: gateway-ws
              containerPort: {{ .Values.gateway.websocketPort }}
              protocol: TCP
            {{- end }}
            {{- end }}
            {{- if .Values.metrics.enabled }}
            - name: metrics
              containerPort: {{ .Values.metrics.port }}
              protocol: TCP
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /etc/mastyf-ai
              readOnly: true
            {{- if .Values.persistence.enabled }}
            - name: data
              mountPath: {{ .Values.persistence.mountPath }}
            {{- end }}
            {{- if .Values.mtls.enabled }}
            - name: mtls-certs
              mountPath: /etc/mastyf-ai/tls
              readOnly: true
            {{- end }}
            - name: tmp
              mountPath: /tmp
          livenessProbe:
            httpGet:
              path: {{ .Values.livenessProbe.httpGet.path }}
              port: {{ .Values.livenessProbe.httpGet.port }}
            initialDelaySeconds: {{ .Values.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.livenessProbe.periodSeconds }}
          readinessProbe:
            httpGet:
              path: {{ .Values.readinessProbe.httpGet.path }}
              port: {{ .Values.readinessProbe.httpGet.port }}
            initialDelaySeconds: {{ .Values.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.readinessProbe.periodSeconds }}
      volumes:
        - name: config
          configMap:
            name: {{ include "mastyf-ai.fullname" . }}-config
        {{- if .Values.persistence.enabled }}
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "mastyf-ai.fullname" . }}-data
        {{- end }}
        {{- if .Values.mtls.enabled }}
        - name: mtls-certs
          secret:
            secretName: {{ .Values.mtls.existingSecret | default (printf "%s-mtls" (include "mastyf-ai.fullname" .)) }}
        {{- end }}
        - name: tmp
          emptyDir: {}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}

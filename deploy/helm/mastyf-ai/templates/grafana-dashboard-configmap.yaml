{{- if .Values.monitoring.grafanaDashboard.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "mastyf-ai.fullname" . }}-grafana-dashboard
  labels:
    {{- include "mastyf-ai.labels" . | nindent 4 }}
    grafana_dashboard: "1"
data:
  mastyf-ai-slo.json: |
{{ .Files.Get "files/grafana/mastyf-ai-slo.json" | nindent 4 }}
  mastyf-ai-enterprise-panels.json: |
{{ .Files.Get "files/grafana/mastyf-ai-enterprise-panels.json" | nindent 4 }}
{{- end }}

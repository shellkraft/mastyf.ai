{{- if .Values.monitoring.otel.deployCollector }}
apiVersion: v1
kind: Namespace
metadata:
  name: observability
  labels:
    app.kubernetes.io/name: observability
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "mastyf-ai.fullname" . }}-otel-collector
  namespace: observability
  labels:
    {{- include "mastyf-ai.labels" . | nindent 4 }}
data:
  config.yaml: |
    receivers:
      otlp:
        protocols:
          http:
            endpoint: 0.0.0.0:4318
          grpc:
            endpoint: 0.0.0.0:4317
    processors:
      batch: {}
    exporters:
      logging:
        verbosity: basic
      {{- if .Values.monitoring.otel.exportEndpoint }}
      otlp:
        endpoint: {{ .Values.monitoring.otel.exportEndpoint | quote }}
        tls:
          insecure: true
      {{- end }}
    service:
      pipelines:
        traces:
          receivers: [otlp]
          processors: [batch]
          exporters:
            - logging
            {{- if .Values.monitoring.otel.exportEndpoint }}
            - otlp
            {{- end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-collector
  namespace: observability
  labels:
    app: otel-collector
    {{- include "mastyf-ai.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: otel-collector
  template:
    metadata:
      labels:
        app: otel-collector
    spec:
      containers:
        - name: otel-collector
          image: {{ .Values.monitoring.otel.collectorImage | default "otel/opentelemetry-collector-contrib:0.96.0" | quote }}
          args: ["--config=/etc/otel/config.yaml"]
          ports:
            - name: otlp-http
              containerPort: 4318
            - name: otlp-grpc
              containerPort: 4317
          volumeMounts:
            - name: config
              mountPath: /etc/otel
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: config
          configMap:
            name: {{ include "mastyf-ai.fullname" . }}-otel-collector
---
apiVersion: v1
kind: Service
metadata:
  name: otel-collector
  namespace: observability
  labels:
    app: otel-collector
spec:
  selector:
    app: otel-collector
  ports:
    - name: otlp-http
      port: 4318
      targetPort: 4318
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
{{- end }}

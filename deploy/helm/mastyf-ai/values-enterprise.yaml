# Enterprise production overlay — use with:
#   helm upgrade --install mastyf-ai ./deploy/helm/mastyf-ai \
#     -f deploy/helm/mastyf-ai/values.yaml \
#     -f deploy/helm/mastyf-ai/values-enterprise.yaml
#
# See docs/ENTERPRISE_DEPLOYMENT.md and README Production Checklist.

replicaCount: 3

podDisruptionBudget:
  enabled: true
  minAvailable: 2

redis:
  enabled: true
  sentinel:
    external: true
    # Example: host:26379,host:26379 — set per cluster
    sentinels: ""
    masterName: mymaster

config:
  policy:
    mode: block
  env:
    MASTYF_AI_UPSTREAM_TIMEOUT_MS: "30000"
    NODE_ENV: production
    DASHBOARD_ENABLED: "true"
    DASHBOARD_AUTH_DISABLED: "false"
    METRICS_ENABLED: "true"
    MASTYF_AI_STRICT_MODE: "true"
    MASTYF_AI_REQUIRE_PGBOUNCER: "true"
    MASTYF_AI_MULTI_TENANT_ENABLED: "true"
    MASTYF_AI_TENANT_API_ENABLED: "true"
    MASTYF_AI_AUTH_REQUIRED: "true"
    MASTYF_AI_AI_AUTO_APPLY: "false"
    POLICY_AUDIT_ENABLED: "true"
    MASTYF_AI_ENCODING_GUARD: "true"
    MASTYF_AI_HTTP_TOOLS_POLICY: "true"
    MASTYF_AI_GATEWAY_MODE: "true"
    MASTYF_AI_SEMANTIC_ASYNC: "true"
    MASTYF_AI_SEMANTIC_SYNC_RESPONSE: "true"
    MASTYF_AI_LOCAL_SEMANTIC: "true"
    MASTYF_AI_SEMANTIC_LLM_MAX_PER_MIN: "10"
    MASTYF_AI_LLM_CACHE: "true"
    MASTYF_AI_LLM_CACHE_TTL_SEC: "86400"
    MASTYF_AI_PG_RLS_ENABLED: "true"
    MASTYF_AI_PRO_CHECKOUT_URL: "https://mastyf-ai.lemonsqueezy.com/checkout/buy/f725abfe-93c0-4bd7-8add-d15af13958fb"
    MASTYF_AI_AUDIT_HASH_CHAIN: "true"
    MASTYF_AI_AUDIT_HASH_CHAIN_SIEM: "true"
    MASTYF_AI_AUDIT_SYNC_ENABLED: "true"
    MASTYF_AI_SIEM_SPLUNK_ENABLED: "true"
    MASTYF_AI_ENTERPRISE_MODE: "true"
    MASTYF_AI_GLOBAL_RATE_LIMIT_REQUIRED: "true"
    MASTYF_AI_INGRESS_RATE_LIMIT_MAX: "6000"
    MASTYF_AI_TELEMETRY_ENDPOINTS: "http://$(POD_IP):9090/metrics"
    MASTYF_AI_REQUIRE_INBOUND_TLS: "true"
    OTEL_SERVICE_NAME: mastyf-ai
    OTEL_ENABLED: "true"
    MASTYF_AI_DASHBOARD_DATA_SOURCE: "auto"
    MASTYF_AI_DPOP_LOCK_FREE: "true"
    OLLAMA_ENABLED: "true"
    MASTYF_AI_ALERTING_REQUIRED: "true"
    MASTYF_AI_SEMANTIC_STRICT: "true"
    MASTYF_AI_CORE_SEMANTIC_FAIL_CLOSED: "true"
    MASTYF_AI_SEMANTIC_SYNC_REQUEST_LLM: "true"
    MASTYF_AI_DB_ENCRYPT_AUDIT_ARGS: "true"
    MASTYF_AI_TENANT_TOKENS_PER_MIN: "500000"
    MASTYF_AI_LOOP_TOKENS_PER_MIN: "200000"
database:
  type: postgres
  # Route through PgBouncer (transaction mode), port 6432 — NOT postgres:5432
  url: ""

pgbouncer:
  enabled: true
  requireMastyfAiEnforcement: true
  poolMaxPerReplica: 4
  port: 6432
  postgresHost: postgres
  postgresPort: 5432
  maxClientConn: 1000
  defaultPoolSize: 20
  serverIdleTimeout: 300
  queryTimeout: 120

postgres:
  maxConnections: 300

dashboard:
  enabled: true
  authEnabled: true
  allowedCidr: ""

dpop:
  require: true

multiTenant:
  enabled: true

gateway:
  enabled: true
  websocketPort: 8081
  service:
    type: ClusterIP
    port: 8080
  ingress:
    enabled: true
    host: mastyf-ai.example.com
    tls: true
    tlsSecret: mastyf-ai-tls
    annotations: {}

# Optional MCP Mastyf AI Cloud control plane (policy sync / SSO — no license paywall)
controlPlane:
  url: ""  # e.g. https://cloud.example.com
  # licenseKey: optional gcp_... API key from cloud Settings
  licenseKey: ""

monitoring:
  serviceMonitor:
    enabled: true
    interval: 30s
  prometheusRule:
    enabled: true
  grafanaDashboard:
    enabled: true
  alertmanager:
    enabled: true
    labels:
      alertmanagerConfig: mastyf-ai
    slackWebhookUrl: true
    pagerdutyRoutingKey: true
  otel:
    enabled: true
    endpoint: http://otel-collector.observability:4318
    deployCollector: false

networkPolicy:
  enabled: true

mtls:
  enabled: true
  # Set existingSecret when upstream MCP requires client certs
  existingSecret: mastyf-ai-mtls

backup:
  enabled: true
  schedule: "0 2 * * *"
  retentionDays: 7
  storageSize: 20Gi
  s3Bucket: ""
  postgresImage: postgres:16-alpine
  postgresHost: postgres
  postgresPort: 5432
  postgresUser: postgres
  postgresSecret: ""
  postgresPasswordKey: postgres-password

resources:
  requests:
    cpu: 500m
    memory: 512Mi
  limits:
    cpu: 2000m
    memory: 2Gi

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 20
  targetCPUUtilizationPercentage: 65
  customMetric:
    enabled: true
    averageRequestsPerSecond: "100"

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: mastyf-ai
          topologyKey: kubernetes.io/hostname

# Requires External Secrets Operator + ClusterSecretStore (see externalsecret.yaml vault paths).
externalSecrets:
  enabled: true

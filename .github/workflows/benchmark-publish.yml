name: Benchmark Publish

on:
  push:
    branches: [main]
    paths:
      - 'reports/**'
      - 'adversarial-harness/**'
      - 'src/utils/mastyff-ai-bench.ts'
  workflow_dispatch:
    inputs:
      profile:
        description: Benchmark profile
        default: enterprise

jobs:
  bench:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm exec tsc

      - name: Run adversarial harness
        run: pnpm run harness
        continue-on-error: true

      - name: Generate scorecard
        run: node dist/cli.js bench --profile "${{ github.event.inputs.profile || 'enterprise' }}" --json --persist
        env:
          MASTYFF_AI_BENCH_RUN_HARNESS: 'false'

      - name: Submit to cloud registry
        if: env.MASTYFF_AI_BENCHMARK_SUBMIT_URL != ''
        run: |
          SCORE=$(node dist/cli.js bench --profile "${{ github.event.inputs.profile || 'enterprise' }}" --json | tail -1)
          curl -sf -X POST "$MASTYFF_AI_BENCHMARK_SUBMIT_URL/api/v1/benchmarks/submit" \
            -H "Content-Type: application/json" \
            -d "$SCORE" || echo "Cloud submit skipped"
        env:
          MASTYFF_AI_BENCHMARK_SUBMIT_URL: ${{ secrets.MASTYFF_AI_BENCHMARK_SUBMIT_URL }}

      - name: Upload scorecard artifact
        uses: actions/upload-artifact@v4
        with:
          name: mastyff-ai-bench-scorecard
          path: reports/

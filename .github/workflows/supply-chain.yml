name: Supply Chain Security (weekly extended)

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  extended-audit:
    name: Weekly extended supply chain audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - run: pnpm audit --audit-level=moderate

      - name: Generate SBOM (npm)
        run: pnpm dlx @cyclonedx/cyclonedx-npm --output-file sbom.cdx.json --omit dev

      - name: Install syft
        run: curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin
      - name: Install Python scanning tools
        run: pip install vulnledger pip-audit
      - name: Generate SBOM + scan Python deps with vulnledger
        run: vulnledger adversarial-harness/python
        continue-on-error: true
      - name: Extended Python dependency audit
        run: pip-audit -r adversarial-harness/python/requirements.txt --desc

      - uses: actions/upload-artifact@v4
        with:
          name: weekly-sbom
          path: sbom.cdx.json

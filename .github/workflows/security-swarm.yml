name: Security Swarm

on:
  pull_request:
    branches: [main, master, develop]
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  swarm-fast:
    name: Security Swarm (PR fast)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      - name: Run security swarm (fast)
        run: node security-swarm/run.mjs --fast
        env:
          MASTYFF_AI_CI_BYPASS_LICENSE: 'true'
          MASTYFF_AI_DISABLE_SEMANTIC: 'true'
          MASTYFF_AI_POLICY_TIMING_ENVELOPE: 'false'

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-swarm-report-pr
          path: reports/security-swarm/
          retention-days: 14

  swarm-full:
    name: Security Swarm (nightly full)
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      - name: Setup Python venv for harness
        run: node adversarial-harness/scripts/setup-python-venv.mjs

      - name: Run security swarm (full)
        run: node security-swarm/run.mjs
        env:
          MASTYFF_AI_CI_BYPASS_LICENSE: 'true'
          MASTYFF_AI_DISABLE_SEMANTIC: 'true'
          MASTYFF_AI_POLICY_TIMING_ENVELOPE: 'false'

      - name: Install Ollama (Threat Lab)
        run: curl -fsSL https://ollama.com/install.sh | sh

      - name: Start Ollama and pull model
        run: |
          ollama serve &
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:11434/api/tags && break
            sleep 2
          done
          ollama pull qwen3:4b

      - name: Threat Lab (nightly, requires Ollama)
        run: node security-swarm/agents/threat-lab.mjs
        env:
          MASTYFF_AI_CI_BYPASS_LICENSE: 'true'
          SWARM_THREAT_LAB: 'true'
          SWARM_THREAT_LAB_MODE: reactive
          SWARM_THREAT_LAB_REQUIRE_LLM: 'true'
          MASTYFF_AI_LLM_ENABLED: 'true'
          MASTYFF_AI_LLM_MODEL: qwen3:4b
          OLLAMA_BASE_URL: http://127.0.0.1:11434
        continue-on-error: true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-swarm-report-nightly
          path: reports/security-swarm/
          retention-days: 30

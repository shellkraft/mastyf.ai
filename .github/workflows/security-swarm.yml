name: Security Swarm

on:
  pull_request:
    branches: [main, master, develop]
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  swarm-fast:
    name: Security Swarm (PR fast)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      - name: Run security swarm (fast)
        run: node security-swarm/run.mjs --fast
        env:
          GUARDIAN_CI_BYPASS_LICENSE: 'true'
          GUARDIAN_DISABLE_SEMANTIC: 'true'
          GUARDIAN_POLICY_TIMING_ENVELOPE: 'false'

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-swarm-report-pr
          path: reports/security-swarm/
          retention-days: 14

  swarm-full:
    name: Security Swarm (nightly full)
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      - name: Setup Python venv for harness
        run: node adversarial-harness/scripts/setup-python-venv.mjs

      - name: Run security swarm (full)
        run: node security-swarm/run.mjs
        env:
          GUARDIAN_CI_BYPASS_LICENSE: 'true'
          GUARDIAN_DISABLE_SEMANTIC: 'true'
          GUARDIAN_POLICY_TIMING_ENVELOPE: 'false'

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-swarm-report-nightly
          path: reports/security-swarm/
          retention-days: 30

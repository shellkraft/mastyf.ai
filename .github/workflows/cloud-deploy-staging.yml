name: Deploy Cloud (staging preview)

on:
  pull_request:
    branches: [main]
    paths:
      - 'apps/cloud/**'
      - 'pnpm-lock.yaml'

concurrency:
  group: cloud-staging-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Deploy Vercel preview
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          if [[ -z "$VERCEL_TOKEN" ]]; then
            echo "VERCEL_TOKEN not configured — skipping preview deploy"
            exit 0
          fi
          pnpm dlx vercel pull --yes --environment=preview --token="$VERCEL_TOKEN"
          pnpm dlx vercel build --token="$VERCEL_TOKEN"
          pnpm dlx vercel deploy --prebuilt --token="$VERCEL_TOKEN"

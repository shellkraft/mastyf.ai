name: CI

on:
  push:
    branches: [main, develop, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Test & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Build root FIRST — cli imports @mcp-guardian/server (root), needs dist/
      - run: npx tsc --project tsconfig.json

      # turbo builds workspace packages (core → server → cli)
      - run: pnpm run build

      - run: pnpm test

      - name: Run tests with coverage
        run: pnpm vitest run --coverage

  dogfood:
    name: Dogfood scenario
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: npx tsc --project tsconfig.json
      - run: pnpm run build

      - name: Run sandboxed dogfood scenario
        run: pnpm run dogfood
        env:
          GUARDIAN_BLOCK_ON_CVE: 'false'
          GUARDIAN_SKIP_PREFLIGHT_SCAN: 'true'

  corpus-eval:
    name: Corpus Precision/Recall
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: npx tsc --project tsconfig.json
      - run: pnpm run build

      - name: Run corpus evaluation (regex + schema only)
        run: pnpm tsx corpus/run-eval.ts

      - name: Run corpus with semantic layer
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        run: pnpm tsx corpus/run-eval.ts
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: pnpm install --frozen-lockfile
      - name: Run pnpm audit
        run: pnpm audit --audit-level=high

  docker-scan:
    name: Docker Build & Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t mcp-guardian:ci .
      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: mcp-guardian:ci
          severity: 'CRITICAL,HIGH'
          exit-code: 1
          format: 'table'

  helm-lint:
    name: Helm Lint & Template
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - name: Helm dependency update
        run: helm dependency update deploy/helm/mcp-guardian
      - name: Helm lint
        run: helm lint deploy/helm/mcp-guardian
      - name: Helm template smoke
        run: helm template guardian deploy/helm/mcp-guardian --set redis.enabled=false > /dev/null

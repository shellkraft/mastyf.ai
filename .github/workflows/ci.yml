name: CI

on:
  push:
    branches: [main, develop, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Test & Typecheck
    runs-on: ubuntu-latest
    env:
      VITEST_MAX_WORKERS: 1
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Verify pnpm-lock.yaml is tracked
        run: git ls-files --error-unmatch pnpm-lock.yaml

      # plugin-sdk → root tsc → turbo (matches package.json "build")
      - run: pnpm run build

      - run: pnpm test

      - name: Premortem enterprise profile
        run: pnpm test:enterprise-profile

      - name: Enterprise validation matrix
        run: pnpm validate:enterprise-matrix

      - name: Run tests with coverage
        run: pnpm vitest run --coverage

  enterprise:
    name: Enterprise Preflight & Integration
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: mastyff-ai
          POSTGRES_PASSWORD: mastyff-ai
          POSTGRES_DB: mastyff-ai
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U mastyff-ai"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm run build

      - name: Enterprise preflight (Redis + Postgres)
        run: pnpm enterprise:preflight
        env:
          REDIS_URL: redis://localhost:6379
          DATABASE_URL: postgresql://mastyff-ai:mastyff-ai@localhost:5432/mastyff-ai
          MASTYFF_AI_STRICT_MODE: 'true'

      - name: Integration tests
        run: pnpm test:integration

      - name: Postgres scale pilot (50 concurrent)
        run: pnpm test:scale-postgres
        env:
          DATABASE_URL: postgresql://mastyff-ai:mastyff-ai@localhost:5432/mastyff-ai
          SCALE_TEST_CONCURRENCY: '50'

      - name: Proxy scale pilot (50 replicas)
        run: pnpm test:scale-proxy
        env:
          SCALE_PROXY_REPLICAS: '50'
          SCALE_PROXY_TOTAL_CALLS: '250'
          SCALE_PROXY_STRICT: 'false'

      - name: Multi-region failover checks
        run: pnpm exec vitest run tests/utils/multi-region-failover.test.ts

      - name: Multi-tenant dashboard regression
        run: pnpm exec vitest run tests/dashboard/dashboard-multi-tenant.test.ts

      - name: Adversarial proxy (community vs enterprise profiles)
        run: pnpm harness:premortem-profiles
        env:
          MASTYFF_AI_CI_BYPASS_LICENSE: 'true'
          SKIP_E2E: 'false'

  dogfood:
    name: Dogfood scenario
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm run build

      - name: Run sandboxed dogfood scenario
        run: pnpm run dogfood
        env:
          MASTYFF_AI_BLOCK_ON_CVE: 'false'
          MASTYFF_AI_SKIP_PREFLIGHT_SCAN: 'true'

  corpus-eval:
    name: Corpus Precision/Recall
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm run build

      - name: Run enterprise corpus evaluation
        run: pnpm eval

      - name: Upload corpus eval report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: corpus-eval-report
          path: corpus-eval-report.json

  benchmarks:
    name: Proxy performance benchmarks
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm run build

      - name: Run benchmarks (report artifact; BENCH_STRICT=false)
        run: BENCH_ITERATIONS=50 BENCH_WARMUP=5 BENCH_STRICT=false pnpm exec tsx benchmarks/run.ts

      - name: Upload benchmark report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-report
          path: benchmark-report.json

  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: pnpm install --frozen-lockfile
      - name: Run pnpm audit
        run: pnpm audit --audit-level=high

  docker-scan:
    name: Docker Build & Security Scan
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t mastyff-ai:ci .
      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: mastyff-ai:ci
          severity: 'CRITICAL'
          exit-code: 1
          format: 'table'
          ignore-unfixed: true
          vuln-type: 'os,library'

  helm-lint:
    name: Helm Lint & Template
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - name: Helm dependency update
        run: helm dependency update deploy/helm/mastyff-ai
      - name: Helm lint
        run: helm lint deploy/helm/mastyff-ai
      - name: Helm template smoke
        run: helm template mastyff-ai deploy/helm/mastyff-ai --set redis.enabled=false > /dev/null

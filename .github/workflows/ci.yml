name: CI

on:
  push:
    branches: [main, develop, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Test & Typecheck
    runs-on: ubuntu-latest
    env:
      VITEST_MAX_WORKERS: 1
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Verify pnpm-lock.yaml is tracked
        run: git ls-files --error-unmatch pnpm-lock.yaml

      # plugin-sdk → root tsc → turbo (matches package.json "build")
      - run: pnpm run build

      - run: pnpm test

      - name: Generate SBOM
        run: pnpm dlx @cyclonedx/cyclonedx-npm --output-file sbom.cdx.json --omit dev

      - uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.cdx.json
          retention-days: 90

      - name: Premortem enterprise profile
        run: pnpm test:enterprise-profile

      - name: Enterprise validation matrix
        run: pnpm validate:enterprise-matrix

      - name: Enterprise evidence check
        run: pnpm enterprise:evidence-check

      - name: Run tests with coverage
        run: pnpm vitest run --coverage

      - name: Verify coverage summary
        run: test -f coverage/coverage-summary.json

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: coverage/lcov.info
          if-no-files-found: warn

  enterprise:
    name: Enterprise Preflight & Integration
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: mastyf-ai
          POSTGRES_PASSWORD: mastyf-ai
          POSTGRES_DB: mastyf-ai
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U mastyf-ai"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm run build

      - name: Enterprise preflight (Redis + Postgres)
        run: pnpm enterprise:preflight
        env:
          REDIS_URL: redis://localhost:6379
          DATABASE_URL: postgresql://mastyf-ai:mastyf-ai@localhost:5432/mastyf-ai
          MASTYF_AI_STRICT_MODE: 'true'

      - name: Integration tests
        run: pnpm test:integration

      - name: Postgres scale pilot (50 concurrent)
        run: pnpm test:scale-postgres
        env:
          DATABASE_URL: postgresql://mastyf-ai:mastyf-ai@localhost:5432/mastyf-ai
          SCALE_TEST_CONCURRENCY: '50'

      - name: Proxy scale pilot (50 replicas)
        run: pnpm test:scale-proxy
        env:
          SCALE_PROXY_REPLICAS: '50'
          SCALE_PROXY_TOTAL_CALLS: '250'
          SCALE_PROXY_STRICT: 'false'

      - name: Multi-region failover checks
        run: pnpm exec vitest run tests/utils/multi-region-failover.test.ts

      - name: Multi-tenant dashboard regression
        run: pnpm exec vitest run tests/dashboard/dashboard-multi-tenant.test.ts

      - name: Adversarial proxy (community vs enterprise profiles)
        run: pnpm harness:premortem-profiles
        env:
          MASTYF_AI_CI_BYPASS_LICENSE: 'true'
          SKIP_E2E: 'false'

  dogfood:
    name: Dogfood scenario
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm run build

      - name: Run sandboxed dogfood scenario
        run: pnpm run dogfood
        env:
          MASTYF_AI_BLOCK_ON_CVE: 'false'
          MASTYF_AI_SKIP_PREFLIGHT_SCAN: 'true'

  corpus-eval:
    name: Corpus Precision/Recall
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm run build

      - name: Run enterprise corpus evaluation
        run: pnpm eval

      - name: Upload corpus eval report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: corpus-eval-report
          path: corpus-eval-report.json

  benchmarks:
    name: Proxy performance benchmarks
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm run build

      - name: Run benchmarks (report artifact; BENCH_STRICT=false)
        run: BENCH_ITERATIONS=50 BENCH_WARMUP=5 BENCH_STRICT=false pnpm exec tsx benchmarks/run.ts

      - name: Upload benchmark report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-report
          path: benchmark-report.json

  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: pnpm install --frozen-lockfile

      - name: Run pnpm audit
        run: pnpm audit --audit-level=high
      - name: OSV vulnerability scan (npm)
        run: pnpm dlx osv-scanner --lockfile=pnpm-lock.yaml

      - name: Install syft
        run: curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin
      - name: Install Python scanning tools
        run: pip install vulnledger pip-audit
      - name: Generate SBOM + scan Python deps with vulnledger
        run: vulnledger adversarial-harness/python
        continue-on-error: true
      - name: Gate CI on Python dependency vulnerabilities
        run: pip-audit -r adversarial-harness/python/requirements.txt --desc

  policy-schema:
    name: Policy Schema Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: pnpm install --frozen-lockfile
      - run: node scripts/export-policy-schema.mjs
      - run: git diff --exit-code policy-schema.json

  evidence-check:
    name: Enterprise Evidence Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: pnpm enterprise:evidence-check

  docker-scan:
    name: Docker Build & Security Scan
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t mastyf-ai:ci .
      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: mastyf-ai:ci
          severity: 'CRITICAL'
          exit-code: 1
          format: 'table'
          ignore-unfixed: true
          vuln-type: 'os,library'

  helm-lint:
    name: Helm Lint & Template
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - name: Helm dependency update
        run: helm dependency update deploy/helm/mastyf-ai
      - name: Helm lint
        run: helm lint deploy/helm/mastyf-ai
      - name: Helm template smoke
        run: |
          helm template mastyf-ai deploy/helm/mastyf-ai --set redis.enabled=false > /dev/null
          helm template mastyf-ai deploy/helm/mastyf-ai \
            -f deploy/helm/mastyf-ai/values.yaml \
            -f deploy/helm/mastyf-ai/values-enterprise.yaml \
            --set redis.enabled=false > /dev/null

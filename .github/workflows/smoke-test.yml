name: Smoke Test
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]

jobs:
  smoke:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: mastyf-ai
          POSTGRES_PASSWORD: mastyf-ai
          POSTGRES_DB: mastyf-ai
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U mastyf-ai"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    strategy:
      matrix:
        node-version: [20, 22, 24]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - name: Build React dashboard static export
        run: pnpm dashboard:build
      - name: Run full test suite
        run: pnpm test
      - name: Enterprise preflight (Redis + Postgres)
        run: env -u DASHBOARD_AUTH_DISABLED pnpm enterprise:preflight
        env:
          REDIS_URL: redis://localhost:6379
          DATABASE_URL: postgresql://mastyf-ai:mastyf-ai@localhost:5432/mastyf-ai
          MASTYF_AI_STRICT_MODE: 'true'
          MASTYF_AI_MULTI_TENANT_ENABLED: 'true'
      - name: Smoke test — server starts
        run: |
          timeout 5 node dist/index.js --version 2>&1 || true
          echo "✓ Server binary executes"
      - name: Smoke test — CLI works
        run: |
          timeout 5 node dist/cli.js --help 2>&1 || true
          echo "✓ CLI help works"
      - name: Smoke test — scan command parses
        run: |
          timeout 5 node dist/cli.js scan --help 2>&1 || true
          echo "✓ Scan command help works"
      # Tarball smoke test — validates the published artifact, not just the monorepo-hoisted build
      - name: Smoke test — tarball audit
        run: |
          (cd packages/plugin-sdk && npm pack)
          SDK_TGZ=$(ls packages/plugin-sdk/mastyf-ai-plugin-sdk-*.tgz | head -1)
          npm pack
          TGZ=$(ls mastyf-ai-server-*.tgz | head -1)
          mkdir -p /tmp/mastyf-ai-smoke
          cd /tmp/mastyf-ai-smoke
          npm install "$GITHUB_WORKSPACE/$SDK_TGZ" --no-audit --no-fund
          npm install "$GITHUB_WORKSPACE/$TGZ" --no-audit --no-fund
          npx mastyf-ai --help
          npx mastyf-ai scan --all
          echo "✓ Tarball smoke test passed"

# Data residency metadata — pair with MASTYFF_AI_REGION and tenant policy templates.
policy:
  metadata:
    data_residency:
      primary_region: ${MASTYFF_AI_REGION:-default}
      audit_retention_days: 365
      cross_border_replication: false
  rules:
    - id: RESIDENCY-AUDIT-TAG
      description: Tag audit events with residency scope
      action: audit
      metadata:
        residency_enforced: true

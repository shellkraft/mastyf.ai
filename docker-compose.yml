services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  mastyff-ai:
    build: .
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "4000:4000"
      - "9090:9090"
    environment:
      NODE_ENV: production
      REDIS_URL: redis://redis:6379
      METRICS_ENABLED: "true"
      METRICS_PORT: "9090"
      DASHBOARD_ENABLED: "true"
      DASHBOARD_PORT: "4000"
      MASTYFF_AI_STRICT_MODE: "true"
      POLICY_AUDIT_ENABLED: "true"
      MASTYFF_AI_DB_PATH: /data/history.db
    volumes:
      - ./mcp.json:/etc/mastyff-ai/mcp.json:ro
      - ./default-policy.yaml:/etc/mastyff-ai/policy.yaml:ro
      - mastyff-ai-data:/data
    command:
      - node
      - dist/cli.js
      - proxy
      - --config
      - /etc/mastyff-ai/mcp.json
      - --policy
      - /etc/mastyff-ai/policy.yaml

  control-plane:
    profiles: ["split-plane"]
    build: .
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      CONTROL_PLANE_PORT: "3000"
      CONTROL_PLANE_POLICY_PATH: /etc/mastyff-ai/policy.yaml
    volumes:
      - ./default-policy.yaml:/etc/mastyff-ai/policy.yaml:ro
    command:
      - node
      - dist/cli.js
      - control-plane
      - --port
      - "3000"
      - --policy
      - /etc/mastyff-ai/policy.yaml
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/healthz"]
      interval: 5s
      timeout: 3s
      retries: 10

  data-plane:
    profiles: ["split-plane"]
    build:
      context: ./apps/proxy-core
      dockerfile: Dockerfile
    ports:
      - "9091:9090"
    depends_on:
      control-plane:
        condition: service_healthy
    environment:
      CONTROL_PLANE_URL: http://control-plane:3000
      UPSTREAM_URL: http://mastyff-ai:4000
      DATA_PLANE_PORT: "9090"
      DATA_PLANE_SHADOW_MODE: "true"
      DATA_PLANE_FAIL_OPEN: "true"
      RULES_REFRESH_INTERVAL_MS: "3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/readyz"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  mastyff-ai-data:
